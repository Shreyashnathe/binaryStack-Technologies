# ==========================================
# BinaryStack Technologies - App Config
# ==========================================

# Import local override if it exists (contains database passwords, API keys, JWT secrets)
# This file is ignored by Git to prevent committing sensitive configuration keys.
spring.config.import=optional:classpath:application-local.properties

spring.application.name=binarystack-coaching

# ---- Server ----
server.port=8080

# ---- MySQL DataSource ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/binarystack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ---- JWT ----
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ---- Admin Seed ----
app.admin.email=${APP_ADMIN_EMAIL:owner123@gmail.com}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@123}
app.admin.name=BinaryStack Admin

# ---- OpenRouter (via openai-java SDK) ----
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.base-url=https://openrouter.ai/api/v1
# Primary model (user-provided working model)
openrouter.model=openai/gpt-5.2
# Automatic fallback if primary model returns HTTP 404
openrouter.fallback-models=openai/gpt-4o-mini,mistralai/mistral-7b-instruct:free
openrouter.max-completion-tokens=512
openrouter.http-referer=http://localhost:8080
openrouter.app-title=BinaryStack-Coaching

# ---- Razorpay (Demo / Sandbox) ----
app.razorpay.key-id=${APP_RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${APP_RAZORPAY_KEY_SECRET:}
app.razorpay.currency=${APP_RAZORPAY_CURRENCY:INR}


# ---- Swagger / SpringDoc ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---- Logging ----
logging.level.com.binarystack=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{requestId}] - %msg%n